    #- "project 4": realisations/projects/centrale-pv-kolda.ipynb
    #- "project 5": realisations/projects/pedologie-senegal.ipynb

    # Ajouter ici les apps .md et .ipynb
    #- "Geocoding SN": realisations/apps/test_1.md
    #- "Analyse NDVI": realisations/apps/test_2.ipynb
    #- "App 3": realisations/apps/metashape-batch.ipynb
    #- "App 4": realisations/apps/pyqgis-pdf-exporter.md
    #- "App 5": realisations/apps/webgis-viewer.ipynb

  - Publications: publications.md

  - Blog:
    - blog/index.md

  - Contact: contact.md

