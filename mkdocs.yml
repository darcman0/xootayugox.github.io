# ============================================================
# XOOTAY GOX YI — mkdocs.yml
# Portfolio & Blog de Abdou Aziz Darc
# Géographe · Géomaticien · Télépilote · Sénégal
# ============================================================

site_name: "Xootay Gox Yi"
site_description: "Cartographie, télédétection, drone et géomatique — tutoriels et réalisations par Abdou Aziz Darc, géomaticien au Sénégal."
site_author: "Abdou Aziz Darc"
site_url: "https://xootaygoxyi.com/"

theme:
  name: material
  custom_dir: overrides
  font:
    text: Merriweather Sans
    code: Roboto Mono
  language: fr

  logo: assets/images/favicon-XGY.svg
  favicon: assets/images/favicon-XGY.svg

  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - content.code.copy
    

extra_css:
  - assets/css/extra.css
  - https://unpkg.com/aos@2.3.1/dist/aos.css

extra_javascript:
  - https://unpkg.com/aos@2.3.1/dist/aos.js
  - assets/js/custom.js

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.blocks.caption
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      title: Sur cette page

plugins:
  - search
  - meta
  - mkdocs-jupyter
  - macros
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date.created
        as_update: date.updated
      categories:
        - categories
      comments_path: "#commentaires"
  - blog:
      archive_date_format: MM/yyyy
      archive_url_date_format: MM/yyyy
      post_url_format: "{slug}"
      pagination_per_page: 5
      archive_pagination_per_page: 10
      categories_pagination_per_page: 10

hooks:
  - hooks/socialmedia.py

# ============================================================
# NAVIGATION
# Pour ajouter un projet : 
#   1. Crée docs/projects/mon-projet.md avec le front matter
#   2. Ajoute une ligne ici : - "Titre": projects/mon-projet.md
#   La carte se génère automatiquement dans projects/index.md
#
# Pour ajouter une app :
#   1. Crée docs/app/apps/mon-app.md ou .ipynb avec le front matter
#   2. Ajoute une ligne ici : - "Titre": app/apps/mon-app.md
#   La carte se génère automatiquement dans app/index.md
# ============================================================
nav:
